<!DOCTYPE html>
<html>
<head>
  <title>Shasa Tech</title>

  <style>
    body { font-family:'Segoe UI'; background:#eef2f7; margin:0; }
    header { background:#1e3a8a; color:white; padding:15px; display:flex; justify-content:space-between; }
    .container { max-width:1000px; margin:auto; padding:20px; }

    .card {
      background:white;
      padding:15px;
      margin:15px 0;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    input, select {
      width:100%;
      padding:8px;
      margin:5px 0;
      border-radius:5px;
    }

    button {
      padding:6px 12px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .green { background:#10b981; color:white; }
    .red { background:#ef4444; color:white; }
    .blue { background:#3b82f6; color:white; }
    .yellow { background:#f59e0b; }

    li {
      background:#f9fafb;
      padding:10px;
      margin:5px 0;
      border-radius:6px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
  </style>
</head>

<body>

<header>
  <h2 id="title">Shasa Tech</h2>
  <button onclick="logout()" class="red">Logout</button>
</header>

<div class="container">

<div class="card">
  <h3>Dashboard</h3>
  <button class="blue" onclick="loadDashboard()">Refresh</button>
  <div id="dashboard"></div>
</div>

<div class="card">
  <h3>Add Student</h3>
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="classInput" placeholder="Class">
  <input id="phone" placeholder="Phone">
  <button class="green" onclick="addStudent()">Add</button>
  <button class="blue" onclick="loadStudents()">Load</button>
</div>

<div class="card">
  <h3>Attendance</h3>
  <button class="blue" onclick="startAttendance()">Take Attendance</button>
  <ul id="attendanceList"></ul>
</div>

<div class="card">
  <h3>View Attendance</h3>
  <input type="date" id="attDate">
  <button class="blue" onclick="viewAttendance()">View</button>
  <ul id="attList"></ul>
</div>

<div class="card">
  <h3>Fees</h3>
  <select id="feeStudent"></select>
  <input id="feeAmount" placeholder="Total Fee">
  <select id="feeType">
    <option value="monthly">Monthly</option>
    <option value="one-time">One-Time</option>
  </select>
  <input id="feeMonth" placeholder="Month">
  <button class="green" onclick="addFees()">Add Fees</button>
  <button class="blue" onclick="loadFees()">Load Fees</button>
  <ul id="feeList"></ul>
</div>

</div>

<script>

const BASE = "https://shasa-backend.onrender.com";
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href="login.html";

// SCHOOL NAME
fetch(`${BASE}/school/${user.school_id}`)
.then(r=>r.json())
.then(d=>{
  document.getElementById("title").innerText = d?.name || "Shasa Tech";
});

// DASHBOARD
async function loadDashboard(){
  const res = await fetch(`${BASE}/dashboard/${user.school_id}`);
  const d = await res.json();

  dashboard.innerHTML = `
    💰 ₹${d.total_collected} | Pending ₹${d.pending} <br>
    👨‍🎓 Present ${d.present} | Absent ${d.absent}
  `;
}

// ADD STUDENT
async function addStudent(){
  await fetch(`${BASE}/students`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:name.value,
      email:email.value,
      class:document.getElementById("classInput").value,
      phone:phone.value,
      school_id:user.school_id
    })
  });
  alert("Added");
}

// LOAD STUDENTS WITH EDIT DELETE
async function loadStudents(){
  const res = await fetch(`${BASE}/students/${user.school_id}`);
  const data = await res.json();

  const list=document.getElementById("feeList");
  list.innerHTML="";

  data.forEach(s=>{
    list.innerHTML+=`
    <li>
      ${s.name} (${s.class})
      <div>
        <button class="yellow" onclick="editStudent(${s.id},'${s.name}','${s.email}','${s.class}','${s.phone}')">Edit</button>
        <button class="red" onclick="deleteStudent(${s.id})">Delete</button>
      </div>
    </li>`;
  });

  loadStudentsForFees();
}

// EDIT
async function editStudent(id,n,e,c,p){
  const name=prompt("Name",n);
  const email=prompt("Email",e);
  const cls=prompt("Class",c);
  const phone=prompt("Phone",p);

  await fetch(`${BASE}/students/${id}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,email,class:cls,phone})
  });

  loadStudents();
}

// DELETE
async function deleteStudent(id){
  await fetch(`${BASE}/students/${id}`,{method:"DELETE"});
  loadStudents();
}

// ATTENDANCE WITH COLOR
let attendance={};

async function startAttendance(){
  const res=await fetch(`${BASE}/students/${user.school_id}`);
  const students=await res.json();

  const list=document.getElementById("attendanceList");
  list.innerHTML="";

  students.forEach(s=>{
    attendance[s.id]="present";

    list.innerHTML+=`
    <li id="row-${s.id}">
      ${s.name}
      <div>
        <button onclick="mark(${s.id},'present')" class="green">✔</button>
        <button onclick="mark(${s.id},'absent')" class="red">❌</button>
      </div>
    </li>`;
  });

  list.innerHTML+=`<button onclick="saveAttendance()" class="blue">Save</button>`;
}

function mark(id,status){
  attendance[id]=status;
  const row=document.getElementById(`row-${id}`);
  row.style.background=status==="present" ? "#d1fae5" : "#fee2e2";
}

async function saveAttendance(){
  const records=Object.keys(attendance).map(id=>({student_id:id,status:attendance[id]}));

  await fetch(`${BASE}/attendance`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({records,school_id:user.school_id})
  });

  alert("Saved");
}

// FEES
async function loadStudentsForFees(){
  const res=await fetch(`${BASE}/students/${user.school_id}`);
  const data=await res.json();

  feeStudent.innerHTML="";
  data.forEach(s=>{
    feeStudent.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
  });
}

async function addFees(){
  await fetch(`${BASE}/fees`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      student_id:feeStudent.value,
      amount:feeAmount.value,
      type:feeType.value,
      month:feeMonth.value,
      school_id:user.school_id
    })
  });
  loadFees();
}

async function loadFees(){
  const res=await fetch(`${BASE}/fees/${user.school_id}`);
  const data=await res.json();

  const list=document.getElementById("feeList");
  list.innerHTML="";

  data.forEach(f=>{
    list.innerHTML+=`
    <li>
      ${f.name} | ₹${f.total} | Paid ₹${f.paid} | Pending ₹${f.pending}
      <div>
        <input id="pay-${f.student_id}" placeholder="Pay">
        <button onclick="pay(${f.student_id})" class="green">Pay</button>
        <button onclick="whatsapp('${f.name}',${f.pending})" class="blue">WhatsApp</button>
      </div>
    </li>`;
  });
}

async function pay(id){
  const amount=document.getElementById(`pay-${id}`).value;

  await fetch(`${BASE}/payments`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({student_id:id,amount,school_id:user.school_id})
  });

  loadFees();
}

function whatsapp(name,pending){
  if(pending<=0){alert("No pending");return;}
  const msg=`Hi ${name}, pending fee ₹${pending}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

// LOGOUT
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

</script>
</body>
</html>
