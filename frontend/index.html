<!DOCTYPE html>
<html>
<head>
  <title>Shasa Tech</title>

  <style>
    body { font-family:'Segoe UI'; background:#eef2f7; margin:0; }
    header { background:#1e3a8a; color:white; padding:15px; display:flex; justify-content:space-between; }
    .container { max-width:1000px; margin:auto; padding:20px; }

    .card {
      background:white;
      padding:15px;
      margin:15px 0;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    input, select {
      width:100%;
      padding:8px;
      margin:5px 0;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button {
      padding:6px 12px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .green { background:#10b981; color:white; }
    .red { background:#ef4444; color:white; }
    .blue { background:#3b82f6; color:white; }
    .yellow { background:#f59e0b; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
    }

    .box {
      padding:10px;
      border-radius:8px;
      color:white;
      text-align:center;
      font-weight:bold;
    }

    .b1 { background:#3b82f6; }
    .b2 { background:#10b981; }
    .b3 { background:#f59e0b; }
    .b4 { background:#6366f1; }
    .b5 { background:#ef4444; }
    .b6 { background:#8b5cf6; }

    li {
      background:#f9fafb;
      padding:10px;
      margin:5px 0;
      border-radius:6px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
  </style>
</head>

<body>

<header>
  <h2 id="title">Shasa Tech</h2>
  <button onclick="logout()" class="red">Logout</button>
</header>

<div class="container">

  <!-- DASHBOARD -->
  <div class="card">
    <h3>Dashboard</h3>
    <button class="blue" onclick="loadDashboard()">Refresh</button>
    <div id="dashboard" class="grid"></div>
  </div>

  <!-- STUDENTS -->
  <div class="card">
    <h3>Add Student</h3>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="class" placeholder="Class">
    <input id="phone" placeholder="Phone">
    <button class="green" onclick="addStudent()">Add</button>
    <button class="blue" onclick="loadStudents()">Load</button>
  </div>

  <!-- ATTENDANCE -->
  <div class="card">
    <h3>Attendance</h3>
    <button class="blue" onclick="startAttendance()">Take Attendance</button>
  </div>

  <div class="card">
  <h3>View Attendance</h3>

  <input type="date" id="attDate">
  <button class="blue" onclick="viewAttendance()">View</button>

  <ul id="attList"></ul>
</div>
  <!-- FEES -->
  <div class="card">
    <h3>Fees</h3>

    <select id="feeStudent"></select>
    <input id="feeAmount" placeholder="Total Fee">
    <select id="feeType">
      <option value="monthly">Monthly</option>
      <option value="one-time">One-Time</option>
    </select>
    <input id="feeMonth" placeholder="Month">

    <button class="green" onclick="addFees()">Add Fees</button>
    <button class="blue" onclick="loadFees()">Load Fees</button>

    <ul id="list"></ul>
  </div>

</div>

<!-- ONLY CHANGE: added BASE and replaced URLs -->

<script>

const BASE = "https://shasa-backend.onrender.com";

const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href="login.html";

// SCHOOL NAME
fetch(`${BASE}/school/${user.school_id}`)
.then(r=>r.json())
.then(d=>{
  document.getElementById("title").innerText = d.name;
});

// DASHBOARD
async function loadDashboard(){
  try {
    const res = await fetch(`${BASE}/dashboard/${user.school_id}`);
    const d = await res.json();

    document.getElementById("dashboard").innerHTML = `
      <div>💰 Total Collected: ₹${d.total_collected}</div>
      <div>📅 Today Collection: ₹${d.today_collection}</div>
      <div>📊 Total Fees: ₹${d.total_fees}</div>
      <div>✅ Paid: ₹${d.total_paid}</div>
      <div>❌ Pending: ₹${d.pending}</div>
      <div>👨‍🎓 Present: ${d.present} | Absent: ${d.absent}</div>
    `;
  } catch (err) {
    alert("Dashboard failed ❌");
  }
}

// STUDENTS
async function addStudent(){
  await fetch(`${BASE}/students`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:name.value,
      email:email.value,
      class:class.value,
      phone:phone.value,
      school_id:user.school_id
    })
  });
  alert("Added");
}

async function loadStudents(){
  const res = await fetch(`${BASE}/students/${user.school_id}`);
  const data = await res.json();
  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(s=>{
    const li=document.createElement("li");
    li.innerHTML=`${s.name} (${s.class})`;
    list.appendChild(li);
  });

  loadStudentsForFees();
}

async function deleteStudent(id){
  await fetch(`${BASE}/students/${id}`,{method:"DELETE"});
  loadStudents();
}

async function editStudent(id,n,e,c,p){
  const name=prompt("Name",n);
  const email=prompt("Email",e);
  const cls=prompt("Class",c);
  const phone=prompt("Phone",p);

  await fetch(`${BASE}/students/${id}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,email,class:cls,phone})
  });

  loadStudents();
}

// ATTENDANCE
let attendance={},saved=false;

async function startAttendance(){
  const check=await fetch(`${BASE}/attendance-check/${user.school_id}`);
  const r=await check.json();
  if(r.exists){alert("Already taken");return;}

  const res=await fetch(`${BASE}/students/${user.school_id}`);
  const students=await res.json();

  const list=document.getElementById("list");
  list.innerHTML="";

  attendance={}; saved=false;

  students.forEach(s=>{
    attendance[s.id]="present";

    const li=document.createElement("li");
    li.innerHTML=`${s.name}
    <div>
      <button onclick="mark(${s.id},'present')">✔</button>
      <button onclick="mark(${s.id},'absent')">❌</button>
    </div>`;
    list.appendChild(li);
  });

  const btn=document.createElement("button");
  btn.innerText="Save Attendance";
  btn.className="green";
  btn.onclick=saveAttendance;
  list.appendChild(btn);
}

function mark(id,s){
  if(saved) return;
  attendance[id]=s;
}

async function saveAttendance(){
  const records=Object.keys(attendance).map(id=>({student_id:id,status:attendance[id]}));

  await fetch(`${BASE}/attendance`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({records,school_id:user.school_id})
  });

  saved=true;
  alert("Saved");
}

async function viewAttendance(){
  const date = document.getElementById("attDate").value;
  if (!date) return alert("Select date ❌");

  const res = await fetch(`${BASE}/attendance/${user.school_id}/${date}`);
  const data = await res.json();

  const list = document.getElementById("attList");
  list.innerHTML = "";

  let present = [], absent = [];

  data.forEach(s => {
    if (s.status === "present") present.push(s.name);
    else absent.push(s.name);
  });

  list.innerHTML = `
    <li><b>Present:</b> ${present.join(", ")}</li>
    <li><b>Absent:</b> ${absent.join(", ")}</li>
  `;
}

// FEES
async function loadStudentsForFees(){
  const res=await fetch(`${BASE}/students/${user.school_id}`);
  const data=await res.json();

  const d=document.getElementById("feeStudent");
  d.innerHTML="";
  data.forEach(s=>{
    const o=document.createElement("option");
    o.value=s.id;
    o.textContent=s.name;
    d.appendChild(o);
  });
}

async function addFees(){
  await fetch(`${BASE}/fees`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      student_id:feeStudent.value,
      amount:feeAmount.value,
      type:feeType.value,
      month:feeMonth.value,
      school_id:user.school_id
    })
  });
  loadFees();
}

async function loadFees(){
  const res=await fetch(`${BASE}/fees/${user.school_id}`);
  const data=await res.json();

  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(f=>{
    const li=document.createElement("li");
    li.innerHTML=`${f.name} - Pending ₹${f.pending}`;
    list.appendChild(li);
  });
}

function logout(){
  localStorage.removeItem("user");
  window.location.href="login.html";
}

</script>
</body>
</html>
