<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body { font-family:Arial; background:#f4f6f8; padding:20px; }
    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    input {
      width:100%;
      padding:8px;
      margin:5px 0;
    }
    button {
      padding:8px 12px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
    .green { background:#28a745; color:white; }
  </style>
</head>

<body>

<h2>Admin Panel (Shasa Tech)</h2>

<div class="card">
  <h3>Create School</h3>
  <input id="schoolName" placeholder="School Name">
  <button class="green" onclick="createSchool()">Create School</button>
</div>

<div class="card">
  <h3>Create Tutor Login</h3>
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password">
  <input id="schoolId" placeholder="School ID">

  <button class="green" onclick="createUser()">Create Tutor</button>
</div>

<script>
const BASE="https://shasa-backend.onrender.com";

async function createSchool(){
  const res = await fetch(`${BASE}/admin/create-school`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ name:schoolName.value })
  });

  const data = await res.json();
  alert("School ID: " + data.id);
}

async function createUser(){
  await fetch(`${BASE}/admin/create-user`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:name.value,
      email:email.value,
      password:password.value,
      role:"teacher",
      school_id:schoolId.value
    })
  });

  alert("Tutor login created ✅");
}
</script>

</body>
</html>
